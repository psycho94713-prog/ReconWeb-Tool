<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Website OSINT Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0f172a;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:5px;
    background:#334155;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Advanced Website OSINT</h1>

<input
id="username"
type="text"
placeholder="Username"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>

<script src="/static/js/login.js"></script>

</body>

</html>
