<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSINT Dashboard</title>

<style>

body{

margin:0;

font-family:Arial,Helvetica,sans-serif;

background:#0f172a;

color:white;

}

.header{

background:#1e293b;

padding:20px;

text-align:center;

font-size:28px;

font-weight:bold;

}

.container{

padding:30px;

}

.search{

display:flex;

gap:10px;

margin-bottom:30px;

}

input{

flex:1;

padding:12px;

font-size:16px;

border:none;

border-radius:6px;

}

button{

padding:12px 25px;

background:#2563eb;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#1d4ed8;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

}

.card{

background:#1e293b;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,.4);

}

.card h2{

margin-top:0;

font-size:20px;

color:#60a5fa;

}

pre{

white-space:pre-wrap;

word-wrap:break-word;

}

</style>

</head>

<body>

<div class="header">

Advanced Website OSINT Framework

</div>

<div class="container">

<div class="search">

<input
id="domain"
placeholder="Enter Domain (example.com)"
>

<button id="scanBtn">

Scan

</button>

</div>

<div class="cards">

<div class="card">

<h2>WHOIS</h2>

<pre id="whois">Waiting...</pre>

</div>

<div class="card">

<h2>DNS</h2>

<pre id="dns">Waiting...</pre>

</div>

<div class="card">

<h2>SSL</h2>

<pre id="ssl">Waiting...</pre>

</div>

<div class="card">

<h2>Technology</h2>

<pre id="technology">Waiting...</pre>

</div>

<div class="card">

<h2>CMS</h2>

<pre id="cms">Waiting...</pre>

</div>

<div class="card">

<h2>WAF</h2>

<pre id="waf">Waiting...</pre>

</div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>

</html>
